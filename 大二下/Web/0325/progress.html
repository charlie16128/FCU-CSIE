<!DOCTYPE html>
<html>
<body>
<h1>The progress element</h1>

<label for="file">Downloading progress:</label>

<!-- 這是html5新增的進度條控件，id屬性為“file”，代表這個控件的id。
value屬性為“32”，表示這個進度條的目前進度為32%。
max屬性為“100”，表示這個進度條的最大值為100%。
進度條中間的文字“32%”會在不支援進度條控件的瀏覽器中顯示。 -->
<progress id="file" value="32" max="100"> 32% </progress>

</body>
</html>
